name: Deploy Trusim

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Deploy Webhook
        run: |
          curl -i -X POST "https://premise.hackaton.es/hooks/deploy-trusim" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -d '{"repo":"trusim-ai"}'
